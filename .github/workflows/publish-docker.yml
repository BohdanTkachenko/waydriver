name: Publish Docker Image

on:
  push:
    branches: [main]
    tags:
      - 'waydriver-mcp-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g. 0.1.1)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch)
              kind=release
              version="${{ github.event.inputs.version }}"
              ;;
            push)
              if [[ "$GITHUB_REF" == refs/tags/* ]]; then
                kind=release
                version="${GITHUB_REF_NAME#waydriver-mcp-v}"
              else
                kind=main
                version=""
              fi
              ;;
          esac
          echo "kind=${kind}" >> "$GITHUB_OUTPUT"
          if [ "$kind" = "release" ]; then
            # Split "0.1.1" into "0", "0.1", "0.1.1"
            echo "full=${version}" >> "$GITHUB_OUTPUT"
            echo "major=${version%%.*}" >> "$GITHUB_OUTPUT"
            echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/waydriver-mcp
          tags: |
            type=raw,value=latest,enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=main,enable=${{ steps.version.outputs.kind == 'main' }}
          labels: |
            org.opencontainers.image.title=waydriver-mcp
            org.opencontainers.image.description=MCP server for headless Wayland UI testing
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
