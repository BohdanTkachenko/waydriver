name: Publish Docker Image

on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      version:
        description: 'Version to tag (e.g. 0.1.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g. 0.1.1)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            kind=release
            version="${{ inputs.version }}"
          else
            kind=main
            version=""
          fi
          echo "kind=${kind}" >> "$GITHUB_OUTPUT"
          if [ "$kind" = "release" ]; then
            # Split "0.1.1" into "0", "0.1", "0.1.1"
            echo "full=${version}" >> "$GITHUB_OUTPUT"
            echo "major=${version%%.*}" >> "$GITHUB_OUTPUT"
            echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (runtime)
        id: meta-runtime
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/waydriver-mcp
          tags: |
            type=raw,value=latest,enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=main,enable=${{ steps.version.outputs.kind == 'main' }}
          labels: |
            org.opencontainers.image.title=waydriver-mcp
            org.opencontainers.image.description=MCP server for headless Wayland UI testing
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Extract metadata (builder)
        id: meta-builder
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/waydriver-mcp-builder
          tags: |
            type=raw,value=latest,enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.kind == 'release' }}
            type=raw,value=main,enable=${{ steps.version.outputs.kind == 'main' }}
          labels: |
            org.opencontainers.image.title=waydriver-mcp-builder
            org.opencontainers.image.description=Build environment for apps tested with waydriver-mcp (Fedora + Rust + GTK4 dev headers)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push builder
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder-base
          push: true
          tags: ${{ steps.meta-builder.outputs.tags }}
          labels: ${{ steps.meta-builder.outputs.labels }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

      - name: Build and push runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-runtime.outputs.tags }}
          labels: ${{ steps.meta-runtime.outputs.labels }}
          cache-from: |
            type=gha,scope=runtime
            type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=runtime
