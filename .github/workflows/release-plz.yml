name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    outputs:
      mcp_version: ${{ steps.check-mcp.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Check for waydriver-mcp release
        id: check-mcp
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          if [ -n "$RELEASES" ]; then
            version=$(echo "$RELEASES" | jq -r '.[]? | select(.package_name == "waydriver-mcp") | .version // empty')
          else
            version=""
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  publish-docker:
    name: Publish Docker Image
    needs: release-plz-release
    if: needs.release-plz-release.outputs.mcp_version != ''
    uses: ./.github/workflows/publish-docker.yml
    permissions:
      contents: read
      packages: write
    with:
      version: ${{ needs.release-plz-release.outputs.mcp_version }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
