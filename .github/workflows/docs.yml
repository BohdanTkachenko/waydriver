name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "crates/waydriver/CHANGELOG.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run so a
# publish always finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook + mdbook-mermaid
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook,mdbook-mermaid

      - name: Build
        run: mdbook build docs

      - name: Set custom domain (CNAME)
        run: echo 'waydriver.io' > docs/book/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
