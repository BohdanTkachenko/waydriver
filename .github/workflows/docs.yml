name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "crates/waydriver/CHANGELOG.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "crates/waydriver/CHANGELOG.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys to main; PRs run on their own ref and don't contend.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook + mdbook-mermaid
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook,mdbook-mermaid

      # Regenerate the Mermaid JS assets at build time so they aren't vendored
      # in the repo. Idempotent against the committed book.toml config.
      - name: Generate Mermaid assets
        run: mdbook-mermaid install docs

      # Builds the book and fails the job on render errors, missing chapters,
      # or unresolvable {{#include}} directives — the PR "docs not broken" gate.
      - name: Build
        run: mdbook build docs

      - name: Set custom domain (CNAME)
        if: github.event_name != 'pull_request'
        run: echo 'waydriver.io' > docs/book/CNAME

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  # Deploy only for main / manual runs — never for pull requests.
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
